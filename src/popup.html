<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
}

body {
  font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
  padding: 8px;
}

.card {
  background: rgba(248, 248, 250, 0.93);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border: 0.5px solid rgba(255, 255, 255, 0.80);
  border-radius: 14px;
  box-shadow:
    inset 0 0.5px 0 rgba(255,255,255,0.95);
  padding: 14px 16px 12px;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 13px;
}

.mascot {
  width: 33px;
  height: 18px;
  flex-shrink: 0;
}
/* 与主程序、桌面卡片一致的吉祥物动画（含踢足球） */
.tm-body   { transform-origin: 7.5px 13px;   animation: tm-bob 2.6s ease-in-out infinite; }
.tm-shadow { transform-origin: 7.5px 15.5px; animation: tm-shadow 2.6s ease-in-out infinite; }
.tm-eyes   { transform-origin: 7.5px 9px;    animation: tm-blink 3.2s ease-in-out infinite; }
.tm-kickleg{ transform-origin: 11.5px 13px;  animation: tm-kick 2.6s ease-in-out infinite; }
.tm-ball   { transform-origin: 14px 14.4px;  animation: tm-ball 2.6s ease-in-out infinite; }
@keyframes tm-bob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1.2px)} }
@keyframes tm-shadow { 0%,100%{transform:scaleX(1);opacity:.3} 50%{transform:scaleX(.82);opacity:.18} }
@keyframes tm-blink  { 0%,88%,100%{transform:scaleY(1)} 94%{transform:scaleY(.08)} }
@keyframes tm-kick   { 0%,52%,100%{transform:rotate(0)} 60%{transform:rotate(-34deg)} 72%{transform:rotate(4deg)} }
@keyframes tm-ball {
  0%,54% { transform: translate(0,0) rotate(0); }
  62%    { transform: translate(2px,-1.6px) rotate(60deg); }
  70%    { transform: translate(4.5px,0) rotate(160deg); }
  84%    { transform: translate(2px,0) rotate(120deg); }
  100%   { transform: translate(0,0) rotate(0); }
}

.plan-name {
  font-size: 13px;
  font-weight: 600;
  color: #1c1c1e;
  flex: 1;
  letter-spacing: -0.1px;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #8e8e93;
  transition: background 0.3s;
  flex-shrink: 0;
}

/* Quota rows */
.quota {
  margin-bottom: 10px;
}
.quota:last-child { margin-bottom: 0; }

.quota-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
}

.quota-label {
  font-size: 11px;
  font-weight: 500;
  color: rgba(60,60,67,0.7);
  letter-spacing: 0.2px;
}

.quota-right {
  display: flex;
  align-items: baseline;
  gap: 7px;
}

.quota-pct {
  font-size: 13px;
  font-weight: 700;
  color: #1c1c1e;
  font-variant-numeric: tabular-nums;
  min-width: 34px;
  text-align: right;
}

.quota-countdown {
  font-size: 10px;
  color: #8e8e93;
  font-variant-numeric: tabular-nums;
}

/* Bar */
.bar-bg {
  height: 5px;
  background: rgba(60,60,67,0.10);
  border-radius: 3px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  width: 0%;
  transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(90deg, #34c759, #30d158);
}
.bar-fill.mid  { background: linear-gradient(90deg, #ff9f0a, #ffcc02); }
.bar-fill.high { background: linear-gradient(90deg, #ff3b30, #ff6961); }

/* Divider */
.divider {
  height: 0.5px;
  background: rgba(60,60,67,0.15);
  margin: 12px -16px;
}

/* Buttons */
.actions { display: flex; gap: 7px; }

.btn {
  flex: 1;
  height: 27px;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.1px;
  transition: opacity 0.12s, transform 0.08s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn:active { transform: scale(0.96); opacity: 0.8; }

.btn-primary {
  background: linear-gradient(135deg, #6c47ff 0%, #9b74ff 100%);
  color: #fff;
  box-shadow: 0 2px 8px rgba(108,71,255,0.30);
}

.btn-ghost {
  background: rgba(60,60,67,0.09);
  color: rgba(60,60,67,0.85);
}

/* State messages */
.msg {
  font-size: 11px;
  color: #8e8e93;
  text-align: center;
  padding: 6px 0 2px;
}
.msg.err { color: #ff3b30; }

/* Dark mode */
@media (prefers-color-scheme: dark) {
  .card {
    background: rgba(30, 30, 32, 0.94);
    border-color: rgba(255,255,255,0.10);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.07);
  }
  .plan-name   { color: #f2f2f7; }
  .quota-label { color: rgba(235,235,245,0.60); }
  .quota-pct   { color: #f2f2f7; }
  .quota-countdown { color: #48484a; }
  .bar-bg      { background: rgba(255,255,255,0.10); }
  .divider     { background: rgba(255,255,255,0.08); }
  .btn-ghost   { background: rgba(255,255,255,0.09); color: rgba(235,235,245,0.80); }
}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <svg class="mascot" viewBox="-1 4 22 12" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect class="tm-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity=".3"/>
      <g class="tm-body">
        <g fill="#DE886D">
          <rect x="3" y="13" width="1" height="2"/>
          <rect x="5" y="13" width="1" height="2"/>
          <rect x="9" y="13" width="1" height="2"/>
        </g>
        <rect class="tm-kickleg" x="11" y="13" width="1" height="2" fill="#DE886D"/>
        <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
        <rect x="0" y="9" width="2"  height="2" fill="#DE886D"/>
        <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
        <g class="tm-eyes" fill="#000">
          <rect x="4"  y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
        <rect x="6.4" y="10.8" width="2.2" height="1" rx=".5" fill="#7a2230"/>
      </g>
      <g class="tm-ball" shape-rendering="geometricPrecision">
        <circle cx="14" cy="14.4" r="1.2" fill="#fff" stroke="#1c1c1e" stroke-width="0.32"/>
        <path d="M14 13.85 L14.52 14.23 L14.32 14.85 L13.68 14.85 L13.48 14.23 Z" fill="#1c1c1e"/>
        <g stroke="#1c1c1e" stroke-width="0.16" stroke-linecap="round">
          <line x1="14" y1="13.85" x2="14" y2="13.22"/>
          <line x1="14.52" y1="14.23" x2="15.05" y2="14.04"/>
          <line x1="14.32" y1="14.85" x2="14.66" y2="15.31"/>
          <line x1="13.68" y1="14.85" x2="13.34" y2="15.31"/>
          <line x1="13.48" y1="14.23" x2="12.95" y2="14.04"/>
        </g>
      </g>
    </svg>
    <span class="plan-name" id="plan-name">加载中...</span>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <div id="content"><div class="msg">正在获取用量数据...</div></div>

  <div class="divider"></div>
  <div class="actions">
    <button class="btn btn-primary" id="btn-open">打开 Cortex</button>
    <button class="btn btn-ghost"   id="btn-quit">退出</button>
  </div>
</div>

<script>
const invoke = window.__TAURI__.core.invoke;

function cls(p) { return p >= 80 ? 'high' : p >= 50 ? 'mid' : ''; }

function countdown(iso) {
  if (!iso) return '';
  const diff = Math.max(0, new Date(iso) - Date.now());
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (d > 0) return `${d}天${h}h后重置`;
  if (h > 0) return `${h}h ${m}m后重置`;
  return `${m}分钟后重置`;
}

const _lastW = {};   // 记住每条进度条上次宽度：刷新时从上次往上涨，而非每次从 0 重来
function quotaHtml(label, pct, resetsAt) {
  const p    = pct != null ? Math.round(pct) : null;
  const w    = p != null ? Math.min(p, 100) : 0;
  const prev = _lastW[label] ?? 0;
  _lastW[label] = w;
  const c    = p != null ? cls(p) : '';
  const pStr = p != null ? p + '%' : '--';
  return `<div class="quota">
    <div class="quota-row">
      <span class="quota-label">${label}</span>
      <span class="quota-right">
        <span class="quota-countdown">${countdown(resetsAt)}</span>
        <span class="quota-pct">${pStr}</span>
      </span>
    </div>
    <div class="bar-bg"><div class="bar-fill ${c}" style="width:${prev}%"
      data-w="${w}"></div></div>
  </div>`;
}

// 渲染同一份后端推送的数据（三处共用，精度/数值一致）
function render(u) {
  if (!u) return;
  const planEl  = document.getElementById('plan-name');
  const dot     = document.getElementById('status-dot');
  const content = document.getElementById('content');

  if (u.error) {
    planEl.textContent = u.plan || '获取失败';
    dot.style.background = '#ff3b30';
    content.innerHTML = `<div class="msg err">${u.error}</div>`;
    return;
  }

  planEl.textContent = u.plan || 'Claude';
  dot.style.background = '#34c759';

  let html = '';
  if (u.five_hour_pct != null || u.five_hour_resets_at)
    html += quotaHtml('5 小时额度', u.five_hour_pct, u.five_hour_resets_at);
  if (u.seven_day_pct != null || u.seven_day_resets_at)
    html += quotaHtml('7 天额度', u.seven_day_pct, u.seven_day_resets_at);
  if (!html) html = '<div class="msg">暂无额度数据</div>';
  content.innerHTML = html;

  requestAnimationFrame(() => requestAnimationFrame(() => {
    content.querySelectorAll('.bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }));
}

async function load() {
  try { render(await invoke('get_claude_usage', { force: false })); }
  catch (e) {
    document.getElementById('plan-name').textContent = '出错';
    document.getElementById('content').innerHTML = `<div class="msg err">${e}</div>`;
  }
}

// 实时同步：后台轮询每 30s 广播一次，弹框即便隐藏也跟着更新，打开即最新
window.__TAURI__.event.listen('usage-updated', (e) => render(e.payload));

document.getElementById('btn-open').onclick = async () => {
  await invoke('show_main_window');
  await invoke('hide_tray_popup');
};
document.getElementById('btn-quit').onclick = () => invoke('quit_app');

load();
</script>
</body>
</html>
